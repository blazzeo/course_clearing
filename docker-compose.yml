services:
  api:
    image: clearing-api
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    environment:
      SOLANA_RPC_URL: http://127.0.0.1:8899
      RUST_LOG: info
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - solana-localnet
    restart: unless-stopped
    profiles:
      - all
      - api

  nginx:
    image: nginx:alpine
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gateway
    environment:
        VITE_API_URL: http://localhost:3001/api
        VITE_SOLANA_RPC_URL: http://127.0.0.1:8899
    ports:
      - "3000:80"
    volumes:
      # - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - /dev/null:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - solana-localnet
    restart: unless-stopped

  solana-localnet:
    build:
      context: ./clearing_solana/
      dockerfile: Dockerfile
    container_name: solana-localnet
    volumes:
      - ./program:/app
      - /home/user/.config/solana/id.json:/root/.config/solana
    entrypoint: /bin/bash
    tty: true
    restart: unless-stopped

volumes:
  postgres_data:
  solana-data:
