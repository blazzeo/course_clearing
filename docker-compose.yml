services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: clearing
      POSTGRES_PASSWORD: clearing
      POSTGRES_DB: clearing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearing -d clearing"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    profiles:
      - all
      - db
      - api
      - frontend

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: clearing-api:latest
    container_name: api
    environment:
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-http://localnet:8899}
      SOLANA_WS_URL: ${SOLANA_WS_URL:-ws://localnet:8900}
      DATABASE_URL: ${DATABASE_URL:-postgres://clearing:clearing@postgres:5432/clearing}
      ADMIN_PUBKEY: ${ADMIN_PUBKEY}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      RUST_LOG: info
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      localnet:
        condition: service_healthy
      anchor-deploy:
        condition: service_completed_successfully
    restart: unless-stopped
    profiles:
      - all
      - api

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_SOLANA_RPC_URL: /solana
    container_name: gateway
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - localnet
    restart: unless-stopped
    profiles:
      - all
      - frontend

  anchor-builder:
    build:
      context: ./clearing_solana
      dockerfile: Dockerfile
    container_name: anchor-builder
    working_dir: /app
    volumes:
      - ./clearing_solana:/app
      - anchor-data:/app/target
    # command: ["sh", "-c", "anchor keys sync && anchor build"]
    restart: "no"
    profiles:
      - dev
      - solana

  anchor-deploy:
    build:
      context: ./clearing_solana
      dockerfile: Dockerfile
      target: deploy
    image: clearing-anchor-deploy:latest
    container_name: anchor-deploy
    environment:
      SOLANA_URL: http://localnet:8899
      ADMIN_SECRET_KEY_JSON: ${ADMIN_SECRET_KEY_JSON:-}
      AIRDROP_ADDRESSES: ${AIRDROP_ADDRESSES:-}
      AIRDROP_SOL: ${AIRDROP_SOL:-2}
    command: >
      sh -c '
      export PATH="/root/.local/share/solana/install/active_release/bin:$$PATH" &&
      mkdir -p /root/.config/solana &&
      if [ -n "$$ADMIN_SECRET_KEY_JSON" ]; then
        echo "$$ADMIN_SECRET_KEY_JSON" > /root/.config/solana/id.json;
      else
        solana-keygen new --force --no-bip39-passphrase --silent -o /root/.config/solana/id.json;
      fi &&
      solana config set --url "$$SOLANA_URL" --keypair /root/.config/solana/id.json &&
      solana airdrop 200 "$(solana-keygen pubkey /root/.config/solana/id.json)" || true &&
      anchor migrate --provider.cluster "$$SOLANA_URL" --provider.wallet /root/.config/solana/id.json
      '
    depends_on:
      localnet:
        condition: service_healthy
    restart: "no"
    profiles:
      - all
      - solana
      - api
      - frontend

  localnet:
    image: solanalabs/solana:v1.18.26
    container_name: localnet
    # 0.0.0.0 — иначе RPC из других контейнеров и с хоста не достучаться.
    command: >
      solana-test-validator --reset --ledger /ledger
      --rpc-port 8899 --dynamic-port-range 8900-8999
      --bind-address 0.0.0.0
      --quiet
    volumes:
      - localnet-ledger:/ledger
    ports:
      - "8899:8899"
      - "8900:8900"
    healthcheck:
      test: ["CMD-SHELL", "solana cluster-version -u http://127.0.0.1:8899 >/dev/null 2>&1"]
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 15s
    profiles:
      - all
      - solana
      - api
      - frontend

volumes:
  postgres_data:
  anchor-data:
  localnet-ledger:
