services:
  postgres:
    image: postgres:16-bookworm
    restart: always
    container_name: clearing-postgres
    environment:
      POSTGRES_USER: clearing_user
      POSTGRES_PASSWORD: clearing_pass
      POSTGRES_DB: clearing_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearing_user -d clearing_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    image: clearing-api
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: clearing-api
    environment:
      DATABASE_URL: postgres://clearing_user:clearing_pass@postgres:5432/clearing_db
      SOLANA_RPC_URL: https://api.devnet.solana.com
      RUST_LOG: debug
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clearing-frontend
    environment:
      VITE_API_URL: http://localhost/api
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: clearing-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped

volumes:
  postgres_data:
