services:
  postgres:
    image: postgres:16-bookworm
    restart: always
    container_name: postgres
    environment:
      POSTGRES_USER: clearing_user
      POSTGRES_PASSWORD: clearing_pass
      POSTGRES_DB: clearing_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearing_user -d clearing_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    profiles:
      - all
      - db

  api:
    image: clearing-api
    build:
      context: .
      dockerfile: ./api/Dockerfile
    container_name: api
    environment:
      DATABASE_URL: postgres://clearing_user:clearing_pass@postgres:5432/clearing_db
      SOLANA_RPC_URL: https://api.devnet.solana.com
      SQLX_OFFLINE: true
      ADMIN_PUBKEY: 8gfe4k6Z5iwTxuWmXwPAnTBhDJd6Uo5xTi9kVhtUD49t
      RUST_LOG: info
      PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - all
      - api

  frontend:
    build:
      context: ./frontend/
      dockerfile: ./Dockerfile
      args:
        VITE_API_URL: https://clearing.local/api
        VITE_SOLANA_RPC_URL: https://api.devnet.solana.com
    container_name: frontend
    environment:
      VITE_API_URL: https://clearing.local/api
      VITE_SOLANA_RPC_URL: https://api.devnet.solana.com
    depends_on:
      - api
    restart: unless-stopped
    profiles:
      - all
      - web

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    profiles:
      - all
      - web

volumes:
  postgres_data:
