# ===========================
# Nginx config for:
# - React SPA (static files)
# - Rust backend API (reverse-proxy)
# - HTTPS (Let's Encrypt)
#
# Replace:
#  - example.com -> your domain
#  - /var/www/myapp -> path to your React build (index.html, static/)
#  - 127.0.0.1:8000 -> address where your Rust backend listens
# ===========================


# --- upstream: пул серверов бэкенда (можно добавить больше серверов для LB) ---
upstream rust_backend {
    # single local backend; change or add servers if you run multiple instances
    server 127.0.0.1:8000 fail_timeout=5s;
    # пример: server 127.0.0.1:8001 max_fails=3 fail_timeout=30s;
    # можно переключить на unix socket: server unix:/run/myapp.sock;
}


# --- http -> https redirect (port 80) ---
server {
    # слушаем на 80, принимаем только для редиректа на https и для certbot challenge
    listen 80;
    listen [::]:80;

    server_name clearme.com www.clearme.com;

    # Let's Encrypt will use /.well-known/acme-challenge/ — не блокируем этот путь.
    location /.well-known/acme-challenge/ {
        alias /var/lib/letsencrypt/.well-known/acme-challenge/;
        # Убедись, что директория выше существует и доступна Nginx.
    }

    # Простой редирект всех остальных запросов на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Лучше явно задать заголовки безопасности в https сервере
}


# --- HTTPS server (actual site) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name clearme.com www.clearme.com;

    # -------------------------
    # SSL — используем сертификат от Let's Encrypt
    # Подменяй пути на свои, если используешь другие сертификаты.
    # Если используешь certbot --nginx, он обычно автоматически заполняет эти директивы.
    # -------------------------
    ssl_certificate /etc/letsencrypt/live/clearme.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clearme.com/privkey.pem;

    # Strong SSL settings (works for modern clients)
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Root & logs
    root /usr/share/nginx/html;          # Путь к файлам React build (index.html и т.д.)
    access_log /var/log/nginx/myapp.access.log;
    error_log  /var/log/nginx/myapp.error.log warn;

    # -------------------------
    # Security headers (рекомендуется, но можно править)
    # -------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:;" always;
    # HSTS — включай только если точно пользуешься HTTPS и домен корректно настроен
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # -------------------------
    # Static files (React build)
    # -------------------------
    # Serve files directly when they exist; otherwise return index.html (SPA fallback)
    location / {
        # try_files ищет запрошенный файл, затем директорию, иначе отдаёт index.html
        try_files $uri $uri/ /index.html;
        # index index.html;  # root определён выше
    }

    # Кеширование статических ресурсов (изменяй по необходимости)
    # Настраиваем long-term cache для хешированных файлов (js/css/images),
    # а индекс / не кешируем (SPA).
    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # -------------------------
    # API proxy: проксируем запросы /api/ на Rust backend
    # -------------------------
    # Предполагаем, что все backend API доступны под /api/
    location /api/ {
        proxy_pass http://api;     # upstream выше
        proxy_http_version 1.1;             # полезно для websocket и keepalive
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Если Rust backend ожидает корректный путь без /api префикса,
        # можно использовать proxy_pass http://rust_backend/; (обрати внимание на слэш)
        # или использовать rewrite:
        # rewrite ^/api/(.*)$ /$1 break;
        # proxy_pass http://rust_backend;
        #
        # Но в большинстве случаев backend ожидает путь с префиксом /api.
        #
        # Таймауты — подбирай по нагрузке/долгим операциям:
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Максимальный размер тела запроса (напр. для загрузки файлов)
        client_max_body_size 20M;
    }

    # -------------------------
    # Проксирование WebSocket (если нужен)
    # -------------------------
    # Если Rust бэкенд использует WebSocket на /ws или другом пути:
    location /ws/ {
        proxy_pass http://rust_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------
    # Оптимизация: отключаем логирование "favicon.ico" и роботов (опционально)
    # -------------------------
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # -------------------------
    # Error pages (опционально)
    # -------------------------
    error_page 404 /404.html;
    location = /404.html { internal; }
    # аналогично можно добавить 50x страницы
}
