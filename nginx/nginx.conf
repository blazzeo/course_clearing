events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream api {
        server api:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # ===== FRONTEND =====
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # ===== API WITHOUT /api PREFIX =====
        # All requests starting with /api/ go directly to backend (clean path passed through)
        location /api/ {
            proxy_pass http://api/;   # IMPORTANT TRAILING SLASH!!!
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===== SOLANA RPC =====
        location /solana/ {
            proxy_pass https://api.devnet.solana.com/;
            proxy_set_header Host api.devnet.solana.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
