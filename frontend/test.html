<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Клиринговый сервис - Тест</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .card { border: 1px solid #ddd; padding: 20px; margin: 10px 0; border-radius: 8px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        input { padding: 8px; margin: 5px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Клиринговый сервис - Тестовая страница</h1>

    <div class="card">
        <h2>Системная информация</h2>
        <button onclick="loadSystemInfo()">Загрузить информацию о системе</button>
        <div id="systemInfo"></div>
    </div>

    <div class="card">
        <h2>Пользователи</h2>
        <button onclick="loadUsers()">Загрузить пользователей</button>
        <div id="usersList"></div>
    </div>

    <div class="card">
        <h2>Позиции</h2>
        <button onclick="loadPositions()">Загрузить позиции</button>
        <div id="positionsList"></div>
    </div>

    <div class="card">
        <h2>Тест интерфейса</h2>
        <button onclick="testWalletConnection()">Тест подключения кошелька</button>
        <button onclick="testGuestProfile()">Тест профиля гостя</button>
        <button onclick="testAccessDenied()">Тест страницы "Доступ запрещен"</button>
        <div id="walletTest"></div>
        <div id="profileTest"></div>
        <div id="accessTest"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8001/api';

        async function makeRequest(endpoint, method = 'GET', data = null) {
            try {
                const config = {
                    method,
                    headers: { 'Content-Type': 'application/json' }
                };
                if (data) config.body = JSON.stringify(data);

                const response = await fetch(`${API_BASE}${endpoint}`, config);
                const result = await response.json();
                return result;
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        async function loadSystemInfo() {
            const result = await makeRequest('/system/info');
            const div = document.getElementById('systemInfo');
            if (result.success) {
                div.innerHTML = `
                    <div class="success">✓ Система работает</div>
                    <ul>
                        <li>Пользователей: ${result.data.total_users}</li>
                        <li>Контрагентов: ${result.data.active_counterparties}</li>
                        <li>Ожидающих позиций: ${result.data.pending_positions}</li>
                        <li>Выполненных позиций: ${result.data.cleared_positions}</li>
                    </ul>
                `;
            } else {
                div.innerHTML = `<div class="error">✗ Ошибка: ${result.error}</div>`;
            }
        }

        async function testWalletConnection() {
            const div = document.getElementById('walletTest');
            div.innerHTML = '<div class="success">✓ Кошелек подключен (симуляция)</div>';
            // В реальном приложении здесь была бы логика подключения кошелька
        }

        async function testGuestProfile() {
            const div = document.getElementById('profileTest');
            div.innerHTML = `
                <div style="background: #fff3cd; border: 1px solid #ffeaa7; border-radius: 8px; padding: 16px; margin: 10px 0;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div style="width: 24px; height: 24px; border-radius: 50%; background: #856404; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; font-weight: bold;">!</div>
                        <div>
                            <h4 style="margin: 0 0 4px 0; color: #856404;">Аккаунт не верифицирован</h4>
                            <p style="margin: 0; color: #856404; font-size: 14px;">Ваш аккаунт имеет статус "Гость". Для получения полного доступа к системе обратитесь к администратору для верификации аккаунта.</p>
                        </div>
                    </div>
                </div>
                <div style="background: white; padding: 20px; border-radius: 8px; margin: 10px 0;">
                    <h3>Тест формы редактирования профиля</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div>
                            <label style="display: block; font-weight: bold; margin-bottom: 4px;">Email:</label>
                            <input type="email" placeholder="your@email.com" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        </div>
                        <div>
                            <label style="display: block; font-weight: bold; margin-bottom: 4px;">Имя:</label>
                            <input type="text" placeholder="Иван" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        </div>
                        <div>
                            <label style="display: block; font-weight: bold; margin-bottom: 4px;">Фамилия:</label>
                            <input type="text" placeholder="Иванов" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        </div>
                        <div>
                            <label style="display: block; font-weight: bold; margin-bottom: 4px;">Телефон:</label>
                            <input type="tel" placeholder="+7 (999) 123-45-67" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        </div>
                        <div style="grid-column: span 2;">
                            <label style="display: block; font-weight: bold; margin-bottom: 4px;">Компания:</label>
                            <input type="text" placeholder="ООО 'Компания'" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        </div>
                    </div>
                    <div style="margin-top: 16px;">
                        <button style="padding: 8px 16px; background: #4caf50; color: white; border: none; border-radius: 4px; cursor: pointer;">Сохранить</button>
                        <button style="padding: 8px 16px; background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; margin-left: 8px;">Отмена</button>
                    </div>
                </div>
            `;
        }

        async function testGuestProfile() {
            const div = document.getElementById('profileTest');
            div.innerHTML = `
                <div style="background: #fff3cd; border: 1px solid #ffeaa7; border-radius: 8px; padding: 16px; margin: 10px 0;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div style="width: 24px; height: 24px; border-radius: 50%; background: #856404; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; font-weight: bold;">!</div>
                        <div>
                            <h4 style="margin: 0 0 4px 0; color: #856404;">Аккаунт не верифицирован</h4>
                            <p style="margin: 0; color: #856404; font-size: 14px;">Ваш аккаунт имеет статус "Гость". Для получения полного доступа к системе обратитесь к администратору для верификации аккаунта.</p>
                        </div>
                    </div>
                </div>
                <div style="background: white; padding: 20px; border-radius: 8px; margin: 10px 0;">
                    <h3>Тест формы редактирования профиля</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div>
                            <label style="display: block; font-weight: bold; margin-bottom: 4px;">Email:</label>
                            <input type="email" placeholder="your@email.com" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        </div>
                        <div>
                            <label style="display: block; font-weight: bold; margin-bottom: 4px;">Имя:</label>
                            <input type="text" placeholder="Иван" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        </div>
                        <div>
                            <label style="display: block; font-weight: bold; margin-bottom: 4px;">Фамилия:</label>
                            <input type="text" placeholder="Иванов" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        </div>
                        <div>
                            <label style="display: block; font-weight: bold; margin-bottom: 4px;">Телефон:</label>
                            <input type="tel" placeholder="+7 (999) 123-45-67" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        </div>
                        <div style="grid-column: span 2;">
                            <label style="display: block; font-weight: bold; margin-bottom: 4px;">Компания:</label>
                            <input type="text" placeholder="ООО 'Компания'" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        </div>
                    </div>
                    <div style="margin-top: 16px;">
                        <button style="padding: 8px 16px; background: #4caf50; color: white; border: none; border-radius: 4px; cursor: pointer;">Сохранить</button>
                        <button style="padding: 8px 16px; background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; margin-left: 8px;">Отмена</button>
                    </div>
                </div>
            `;
        }

        async function loadUsers() {
            const result = await makeRequest('/participants');
            const div = document.getElementById('usersList');
            if (result.success) {
                const users = result.data.map(user =>
                    `<li>${user.address.slice(0, 8)}... - ${user.user_type} - ${user.is_active ? 'активен' : 'деактивирован'}</li>`
                ).join('');
                div.innerHTML = `<ul>${users}</ul>`;
            } else {
                div.innerHTML = `<div class="error">✗ Ошибка: ${result.error}</div>`;
            }
        }

        async function loadPositions() {
            // Mock wallet address для тестирования
            const mockAddress = 'MockWalletAddress1234567890';
            const result = await makeRequest(`/positions?pbkey=${mockAddress}`);
            const div = document.getElementById('positionsList');
            if (result.success) {
                if (result.data.length === 0) {
                    div.innerHTML = '<div>Позиции отсутствуют</div>';
                } else {
                    const positions = result.data.map(pos =>
                        `<li>ID: ${pos.id}, Сумма: ${pos.amount}, Статус: ${pos.status}</li>`
                    ).join('');
                    div.innerHTML = `<ul>${positions}</ul>`;
                }
            } else {
                div.innerHTML = `<div class="error">✗ Ошибка: ${result.error}</div>`;
            }
        }

        // Автоматическая загрузка при открытии страницы
        window.onload = () => {
            loadSystemInfo();
        };
        async function testAccessDenied() {
            const div = document.getElementById('accessTest');
            div.innerHTML = `
                <div style="background: rgba(244, 67, 54, 0.1); border: 2px solid #f44336; border-radius: 16px; padding: 3rem; max-width: 600px; width: 100%; box-shadow: 0 8px 32px rgba(244, 67, 54, 0.3);">
                    <div style="font-size: 4rem; margin-bottom: 1rem; color: #f44336;">🚫</div>
                    <h1 style="color: #f44336; margin-bottom: 1rem; font-size: 2rem;">Доступ запрещен</h1>
                    <p style="color: #666; font-size: 1.1rem; margin-bottom: 2rem; line-height: 1.6;">
                        Для доступа к <strong>"Админ панель"</strong> требуется роль <strong>"Администратор"</strong>.
                    </p>
                    <div style="background: rgba(255, 193, 7, 0.1); border: 1px solid #ffc107; border-radius: 8px; padding: 1rem; margin-bottom: 2rem;">
                        <p style="margin: 0; color: #856404;">
                            <strong>Подсказка:</strong> Обратитесь к администратору для получения необходимых прав доступа.
                        </p>
                    </div>
                    <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                        <button style="padding: 12px 24px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; font-weight: bold;">🏠 На главную</button>
                        <button style="padding: 12px 24px; background: #4caf50; color: white; text-decoration: none; border-radius: 8px; font-weight: bold;">👤 Профиль</button>
                    </div>
                    <div style="margin-top: 2rem; padding: 1rem; background: rgba(0,0,0,0.05); border-radius: 8px; font-size: 0.9rem; color: #666;">
                        <strong>Информация для разработчиков:</strong><br />
                        Ресурс: /admin<br />
                        Требуемая роль: Администратор<br />
                        Текущий статус кошелька: не подключен
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
